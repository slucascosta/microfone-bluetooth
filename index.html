<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Microfone">
<link rel="manifest" href="manifest.json">
<title>Microfone</title>
<style>
  /* ── Tema global ── */
  :root {
    --bg:      #0a0a0a;
    --surface: #141414;
    --sheet:   #181818;
    --border:  #1e1e1e;
    --red:     #ff2d2d;
    --text:    #f0f0f0;
    --muted:   #3a3a3a;
    --sub:     #606060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Layout do app ── */
  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: clamp(2rem, 6vh, 4rem) 1.5rem clamp(1.5rem, 4vh, 3rem);
  }

  @media (min-width: 600px) and (min-height: 500px) {
    body { background: #050505; }
    .app {
      min-height: auto;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(2rem, 4vh, 3.5rem) 2.5rem clamp(1.5rem, 3vh, 2.5rem);
      gap: clamp(1rem, 3vh, 2rem);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      position: relative;
      z-index: 1;
    }
  }

  /* ── Header ── */
  header { width: 100%; text-align: center; flex-shrink: 0; }

  .app-name {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Hero ── */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
  }

  @media (min-width: 600px) { .hero { flex: none; } }

  /* ── Status ── */
  .status-text {
    font-size: clamp(0.78rem, 2.5vw, 0.85rem);
    color: var(--sub);
    transition: color 0.3s;
    text-align: center;
    min-height: 1.2em;
    margin-top: clamp(0.6rem, 2vh, 1rem);
  }

  .status-text.on  { color: #ff6b6b; }
  .status-text.err { color: #ff9966; font-size: 0.78rem; }

  /* ── Controles ── */
  .controls {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: clamp(0.4rem, 1.5vh, 0.75rem);
    flex-shrink: 0;
  }

  /* ── Botão avançado ── */
  .adv-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(0.7rem, 2vh, 1rem) 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    color: var(--sub);
    font-size: 0.85rem;
    width: 100%;
    text-align: left;
    transition: background 0.15s;
  }

  .adv-btn:hover  { background: #1a1a1a; }
  .adv-btn:active { background: #1c1c1c; }
  .adv-btn-left { display: flex; align-items: center; gap: 10px; }
  .adv-btn-arrow { font-size: 0.75rem; color: var(--muted); }

  /* ── Versão ── */
  .app-version {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-align: center;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <p class="app-name">Microfone</p>
  </header>

  <div class="hero">
    <mic-button id="micBtn"></mic-button>
    <p class="status-text" id="status">Toque para começar</p>
  </div>

  <audio-visualizer id="visualizer"></audio-visualizer>

  <div class="controls">
    <volume-control id="volumeControl"></volume-control>
    <button class="adv-btn" id="advBtn">
      <span class="adv-btn-left"><span>⚙️</span> Avançado</span>
      <span class="adv-btn-arrow">›</span>
    </button>
  </div>

  <p class="app-version" id="appVersion"></p>

</div>

<settings-sheet id="settingsSheet"></settings-sheet>

<script src="version.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
